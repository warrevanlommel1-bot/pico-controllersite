<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PICO Controller</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #fafae6;
      --panel:        #fffff0;
      --border:       #d4d48a;
      --accent:       #2a52be;
      --accent-glow:  rgba(42,82,190,0.25);
      --danger:       #c0392b;
      --danger-glow:  rgba(192,57,43,0.3);
      --success:      #27ae60;
      --text:         #1a1a2e;
      --muted:        #7a7a50;
      --mono:         'Share Tech Mono', monospace;
      --display:      'Barlow Condensed', sans-serif;
    }

    body {
      background-color: var(--bg);
      background-image:
        repeating-linear-gradient(0deg,  transparent, transparent 39px, rgba(180,180,100,0.15) 39px, rgba(180,180,100,0.15) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,180,100,0.15) 39px, rgba(180,180,100,0.15) 40px);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--display);
      color: var(--text);
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 520px;
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 0 0 6px rgba(212,212,138,0.3), 0 20px 60px rgba(0,0,0,0.12);
      overflow: hidden;
      animation: rise 0.5s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      background: var(--text);
      padding: 18px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand { font-size: 22px; font-weight: 900; letter-spacing: 0.12em; color: #f5f0c8; text-transform: uppercase; }
    .brand span { color: #e8c84a; }
    .sub { font-family: var(--mono); font-size: 10px; color: #7a7888; letter-spacing: 0.15em; margin-top: 2px; }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 6px 14px 6px 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: #aaa;
      transition: all 0.3s;
    }
    .status-pill.connected { color: var(--success); border-color: rgba(39,174,96,0.4); background: rgba(39,174,96,0.08); }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; transition: background 0.3s; }
    .status-pill.connected .status-dot { background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* Connect bar */
    .connect-bar {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      background: rgba(212,212,138,0.1);
    }

    .btn-connect {
      flex: 1;
      font-family: var(--display);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 18px;
      border: 1.5px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    .btn-connect:hover  { background: #1d3da8; }
    .btn-connect:active { transform: translateY(1px); }
    .btn-connect.ghost  { background: transparent; color: var(--accent); flex: 0 0 auto; }

    /* Log */
    .log-bar {
      margin: 12px 24px 0;
      background: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 11px;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .log-bar .log-prefix { color: #e8c84a; flex-shrink: 0; }
    .log-text     { color: #b0b0c8; }
    .log-text.ok  { color: var(--success); }
    .log-text.err { color: #e05c4a; }

    /* Calibration panel */
    .cali-panel {
      margin: 12px 24px 0;
      background: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 10px;
    }
    .cali-title {
      color: #e8c84a;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 8px;
    }
    .cali-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .cali-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .ci-label { font-size: 8px; color: #555a77; letter-spacing: 0.1em; text-transform: uppercase; }
    .ci-value { color: #a8d8b0; font-size: 12px; }
    .cali-item.ci-pending .ci-value { color: #555a77; }

    /* Section */
    .section { padding: 20px 24px 0; }
    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* D-Pad */
    .dpad-wrap { display: flex; justify-content: center; padding: 4px 0 20px; }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 72px);
      grid-template-rows: repeat(3, 72px);
      gap: 6px;
    }

    .dpad-btn {
      width: 72px; height: 72px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: white;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-family: var(--display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: all 0.1s;
      user-select: none;
    }
    .dpad-btn .arrow { font-size: 22px; line-height: 1; color: var(--text); }
    .dpad-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 4px 16px var(--accent-glow); transform: translateY(-1px); }
    .dpad-btn:hover .arrow { color: var(--accent); }
    .dpad-btn:active { transform: translateY(1px); background: #eef2ff; }

    .dpad-center { border: none; background: transparent; box-shadow: none; cursor: default; }
    .dpad-center:hover { transform: none; border: none; }

    .dpad-round {
      border-radius: 50% !important;
      border-color: var(--accent) !important;
      color: var(--accent) !important;
      background: #eef2ff !important;
    }
    .dpad-round .round-icon { font-size: 18px; }
    .dpad-round span:last-child { font-size: 8px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .dpad-round:hover { background: var(--accent) !important; color: white !important; }
    .dpad-round:hover span:last-child { color: white; }

    /* Emergency */
    .emergency-bar { padding: 16px 24px 24px; }

    .btn-emergency {
      width: 100%;
      font-family: var(--display);
      font-weight: 900;
      font-size: 20px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 16px;
      border: 2.5px solid var(--danger);
      border-radius: 10px;
      background: white;
      color: var(--danger);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.15s;
    }
    .btn-emergency:hover  { background: var(--danger); color: white; box-shadow: 0 6px 28px var(--danger-glow); transform: translateY(-1px); }
    .btn-emergency:active { transform: translateY(1px); }
    .stop-icon { font-size: 22px; }

    /* Queue */
    .queue-section { padding: 0 24px 16px; }

    .queue-list {
      background: var(--text);
      border-radius: 8px;
      padding: 10px;
      min-height: 48px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      align-content: flex-start;
    }

    .queue-empty {
      font-family: var(--mono);
      font-size: 10px;
      color: #555a77;
      align-self: center;
      padding: 2px 4px;
    }

    .q-item {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(42,82,190,0.2);
      border: 1px solid rgba(42,82,190,0.35);
      border-radius: 6px;
      padding: 4px 8px;
      font-family: var(--mono);
      font-size: 10px;
      color: #b0c8f8;
      animation: pop 0.15s cubic-bezier(.16,1,.3,1);
    }
    @keyframes pop {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .q-remove {
      background: none;
      border: none;
      color: #555a77;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      padding: 0;
      transition: color 0.1s;
    }
    .q-remove:hover { color: var(--danger); }

    .queue-controls { display: flex; gap: 8px; }

    .btn-run {
      flex: 1;
      font-family: var(--display);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px;
      border: 1.5px solid var(--success);
      border-radius: 8px;
      background: var(--success);
      color: white;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-run:hover  { background: #1f8c4c; }
    .btn-run:active { transform: translateY(1px); }
    .btn-run:disabled { opacity: 0.4; cursor: default; }

    .btn-clear-queue {
      font-family: var(--mono);
      font-size: 10px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .btn-clear-queue:hover { border-color: var(--danger); color: var(--danger); }
  </style>
</head>
<body>

<div class="shell">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="brand">TEAM<span> 218</span></div>
      <div class="sub">ws://192.168.4.1:5000</div>
    </div>
    <div class="status-pill" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </div>

  <!-- Connect bar -->
  <div class="connect-bar">
    <button class="btn-connect" onclick="connect_socket()">⚡ Connect to PICO</button>
    <button class="btn-connect ghost" onclick="sendCommand('kalibreer_sensoren')">⟳ Kalibreer</button>
  </div>

  <!-- Log -->
  <div class="log-bar">
    <span class="log-prefix">&gt;_</span>
    <span class="log-text" id="logText">Awaiting connection…</span>
  </div>

  <!-- Calibration values -->
  <div class="cali-panel">
    <span class="cali-title">&gt;_ Kalibratie waarden</span>
    <div class="cali-grid">
      <div class="cali-item ci-pending" id="ci-achter">
        <span class="ci-label">Achter</span>
        <span class="ci-value" id="cv-achter">—</span>
      </div>
      <div class="cali-item ci-pending" id="ci-links">
        <span class="ci-label">Links</span>
        <span class="ci-value" id="cv-links">—</span>
      </div>
      <div class="cali-item ci-pending" id="ci-rechts">
        <span class="ci-label">Rechts</span>
        <span class="ci-value" id="cv-rechts">—</span>
      </div>
    </div>
  </div>

  <!-- Movement control -->
  <div class="section">
    <div class="section-label">Movement control</div>
    <div class="dpad-wrap">
      <div class="dpad">
        <button class="dpad-btn dpad-round" onclick="enqueue('garage')">
          <span class="round-icon">🏠</span>
          <span>Garage</span>
        </button>
        <button class="dpad-btn" onclick="enqueue('move_forward')">
          <span class="arrow">▲</span>
          <span>FWD</span>
        </button>
        <button class="dpad-btn dpad-round" onclick="enqueue('verzamel_object')">
          <span class="round-icon">📦</span>
          <span>Plaats</span>
        </button>

        <button class="dpad-btn" onclick="enqueue('move_left')">
          <span class="arrow">◀</span>
          <span>LEFT</span>
        </button>
        <div class="dpad-btn dpad-center">
          <span style="font-size:22px; color:var(--border);">✛</span>
        </div>
        <button class="dpad-btn" onclick="enqueue('move_right')">
          <span class="arrow">▶</span>
          <span>RIGHT</span>
        </button>

        <div></div>
        <button class="dpad-btn" onclick="enqueue('move_back')">
          <span class="arrow">▼</span>
          <span>BACK</span>
        </button>
        <div></div>
      </div>
    </div>
  </div>

  <!-- Command queue -->
  <div class="queue-section">
    <div class="section-label">Command queue</div>
    <div class="queue-list" id="queueList">
      <span class="queue-empty" id="queueEmpty">No commands queued.</span>
    </div>

    <div style="display:flex; gap:8px; margin-bottom:10px;">
        <input id="queueInput" type="text"
            placeholder='["move_forward","move_right"]'
            style="flex:1; font-family:var(--mono); font-size:11px;
                padding:8px 10px; border:1px solid var(--border);
                border-radius:8px; background:var(--panel); color:var(--text);">
        <button class="btn-clear-queue" onclick="importQueue()">↓ Import</button>
    </div>

    <div class="queue-controls">
      <button class="btn-run" id="btnRun" onclick="runQueue()" disabled>▶ Run queue</button>
      <button class="btn-clear-queue" onclick="clearQueue()">✕ Clear</button>
    </div>
  </div>

  <!-- Emergency stop -->
  <div class="emergency-bar">
    <button class="btn-emergency" onclick="sendCommand('noodstop')">
      <span class="stop-icon">⬛</span>
      NOOD STOP
    </button>
  </div>

</div>

<script>
    function importQueue() {
      try {
        let raw = document.getElementById('queueInput').value.trim();
        raw = raw.replace(/'/g, '"');
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) throw new Error();
        queue = parsed;
        renderQueue();
        setLog('Queue geïmporteerd: ' + parsed.length + ' commando\'s', 'ok');
      } catch {
        setLog('Ongeldige invoer — gebruik ["move_forward","move_right"]', 'err');
      }
    }

  let socket;
  let queue = [];

  // Labels shown in the queue badges
  const LABELS = {
    move_forward:    '▲ FWD',
    move_back:       '▼ BACK',
    move_left:       '◀ LEFT',
    move_right:      '▶ RIGHT',
    garage:          '🏠 Garage',
    verzamel_object: '📦 Plaats',
  };

  /* ── Queue ── */
  function enqueue(command) {
    queue.push(command);
    renderQueue();
    setLog('+ ' + command + ' added to queue', 'ok');
  }

  function removeFromQueue(index) {
    queue.splice(index, 1);
    renderQueue();
  }

  function clearQueue() {
    queue = [];
    renderQueue();
  }

  function renderQueue() {
    const list  = document.getElementById('queueList');
    const empty = document.getElementById('queueEmpty');
    const btn   = document.getElementById('btnRun');

    // Remove all existing items (keep the empty placeholder)
    list.querySelectorAll('.q-item').forEach(el => el.remove());

    empty.style.display = queue.length ? 'none' : '';
    btn.disabled = queue.length === 0;

    queue.forEach((cmd, i) => {
      const item = document.createElement('div');
      item.className = 'q-item';
      item.innerHTML = `<span>${LABELS[cmd] || cmd}</span>
        <button class="q-remove" title="Remove" onclick="removeFromQueue(${i})">✕</button>`;
      list.appendChild(item);
    });
  }

  function runQueue() {
    if (!queue.length) return;
    sendCommand(JSON.stringify(queue));
    queue = [];
    renderQueue();
  }

  /* ── WebSocket ── */
  function setLog(msg, type = '') {
    const el = document.getElementById('logText');
    el.textContent = msg;
    el.className = 'log-text ' + type;
  }

  function setStatus(connected) {
    document.getElementById('statusPill').className = 'status-pill' + (connected ? ' connected' : '');
    document.getElementById('statusText').textContent = connected ? 'Connected' : 'Disconnected';
  }

  function connect_socket() {
    if (socket) socket.close();
    setLog('Connecting to ws://192.168.4.1:5000…');

    socket = new WebSocket('ws://192.168.4.1:5000/connect-websocket');

    socket.addEventListener('open',  () => { setStatus(true);  setLog('Connection established.', 'ok'); });
    socket.addEventListener('close', () => { socket = undefined; setStatus(false); setLog('Connection closed.', 'err'); });
    socket.addEventListener('error', () => { socket = undefined; setStatus(false); setLog('Connection error — check PICO network.', 'err'); });

    socket.addEventListener('message', (event) => {
      if (event.data.startsWith('cali:')) {
        const parts = event.data.slice(5).split(',');
        ['achter','links','rechts'].forEach((key, i) => {
          const val = document.getElementById('cv-' + key);
          if (val && parts[i] !== undefined) {
            val.textContent = parts[i];
            document.getElementById('ci-' + key).classList.remove('ci-pending');
          }
        });
        setLog('← Kalibratie ontvangen', 'ok');
      } else {
        setLog('← ' + event.data);
      }
    });
  }

  function sendCommand(command) {
    if (socket && socket.readyState === WebSocket.OPEN) {
      socket.send(command);
      setLog('→ ' + command, 'ok');
    } else {
      setLog('Not connected — press Connect first.', 'err');
    }
  }
</script>
</body>
</html>
